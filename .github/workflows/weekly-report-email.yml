name: Weekly Report Email — Sun 18:00 Asia/Taipei

# 每週日台灣時間 18:00 = UTC 10:00 (Sunday)
# 老闆/管理者收到後可在週日晚上規劃下週事項
on:
  schedule:
    - cron: "0 10 * * 0"
  workflow_dispatch:

jobs:
  send-weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 寄出上週週報 Email
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body \
            https://haiwangzi.xyz/api/cron/weekly-report-email
