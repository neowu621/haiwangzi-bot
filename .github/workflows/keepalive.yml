name: keepalive

# 每 5 分鐘戳一次 /api/healthz，避免 Zeabur 容器閒置休眠（cold start）。
# healthz 不查 DB、超輕量。GitHub 排程偶爾會延遲幾分鐘，屬正常。
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # 允許手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        run: |
          curl -fsS --max-time 30 "https://haiwangzi.zeabur.app/api/healthz" || true
