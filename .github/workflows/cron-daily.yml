name: Daily Cron — 08:00 Asia/Taipei

# 觸發時間：每天台灣時間 08:00（= UTC 00:00）
# 也可以從 GitHub Actions UI 手動觸發測試
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  trigger-cron-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: LV1 預付款催繳提醒
        run: |
          echo "→ POST /api/cron/lv1-prepay-reminder"
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body \
            https://haiwangzi.xyz/api/cron/lv1-prepay-reminder

      - name: 清理 30 天前付款憑證
        if: always()
        run: |
          echo "→ POST /api/cron/cleanup-old-payment-proofs"
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body \
            https://haiwangzi.xyz/api/cron/cleanup-old-payment-proofs

      - name: 待結算訂單提醒（推 LINE 給 admin）
        if: always()
        run: |
          echo "→ POST /api/cron/daily-settlement-reminder"
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body \
            https://haiwangzi.xyz/api/cron/daily-settlement-reminder
