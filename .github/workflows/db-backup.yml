name: Daily DB Backup — 02:00 Asia/Taipei

# 每天台灣時間 02:00（= UTC 18:00 前一天）
# 觸發 /api/cron/backup-db endpoint，由 Zeabur 容器內 pg_dump → R2
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  trigger-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 觸發 DB 備份
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            --fail-with-body \
            --max-time 540 \
            https://haiwangzi.xyz/api/cron/backup-db
